services:
  couchdb:
    image: couchdb:3.4
    container_name: agentage-memory-couchdb
    restart: unless-stopped
    environment:
      COUCHDB_USER: admin
      COUCHDB_PASSWORD: agentage
    ports:
      - "5984:5984"
    volumes:
      - couchdb-data:/opt/couchdb/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:5984/_up || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  # Configure CORS so the plugin (running inside Obsidian) can talk to CouchDB
  # directly via requestUrl. Origins: app://obsidian.md (desktop),
  # capacitor://localhost (mobile WebView), http://localhost (dev tools).
  #
  # NOTE: command is a YAML array so Compose passes the script as a single arg
  # to `/bin/sh -c` (Compose v5 rejects a multi-line `command: |` string here).
  couchdb-init:
    image: curlimages/curl:8.11.0
    container_name: agentage-memory-couchdb-init
    depends_on:
      couchdb:
        condition: service_healthy
    restart: "no"
    entrypoint: ["/bin/sh"]
    command:
      - "-c"
      - |
        set -eu
        A=http://admin:agentage@couchdb:5984
        curl -fsS -X PUT "$$A/_node/_local/_config/httpd/enable_cors" -H 'Content-Type: application/json' -d '"true"' >/dev/null
        curl -fsS -X PUT "$$A/_node/_local/_config/cors/origins" -H 'Content-Type: application/json' -d '"app://obsidian.md,capacitor://localhost,http://localhost"' >/dev/null
        curl -fsS -X PUT "$$A/_node/_local/_config/cors/credentials" -H 'Content-Type: application/json' -d '"true"' >/dev/null
        curl -fsS -X PUT "$$A/_node/_local/_config/cors/methods" -H 'Content-Type: application/json' -d '"GET,PUT,POST,HEAD,DELETE"' >/dev/null
        curl -fsS -X PUT "$$A/_node/_local/_config/cors/headers" -H 'Content-Type: application/json' -d '"accept, authorization, content-type, origin, referer"' >/dev/null
        echo "[init] CORS configured for app://obsidian.md, capacitor://localhost, http://localhost"

volumes:
  couchdb-data:
