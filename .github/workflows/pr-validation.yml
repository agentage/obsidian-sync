name: PR Validation

on:
  pull_request:
    branches: [master]
    types: [opened, synchronize, reopened]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    name: 🔍 Validate Pull Request
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        id: install
        run: npm ci

      - name: Type check
        id: type-check
        if: always() && steps.install.outcome == 'success'
        run: npm run type-check

      - name: Lint
        id: lint
        if: always() && steps.install.outcome == 'success'
        run: npm run lint

      - name: Format check
        id: format
        if: always() && steps.install.outcome == 'success'
        run: npm run format:check

      - name: Test with coverage
        id: test
        if: always() && steps.install.outcome == 'success'
        run: npm run test:coverage

      - name: Build
        id: build
        if: always() && steps.install.outcome == 'success'
        run: npm run build

      - name: Install Obsidian + Xvfb + window manager for E2E
        id: e2e-setup
        if: always() && steps.build.outcome == 'success'
        # herbstluftwm + dzen2 + x11-xserver-utils: Playwright's `_electron.launch`
        # against Obsidian on Ubuntu 24.04 hangs at `firstWindow()` without a real
        # window manager. Pattern proven by `wdio-obsidian-service` CI.
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            xvfb herbstluftwm dzen2 x11-xserver-utils xdotool xfonts-base xfonts-100dpi jq \
            libgl1-mesa-dri libglx-mesa0 libegl-mesa0 mesa-utils
          OBSIDIAN_VERSION=$(curl -fsSL https://api.github.com/repos/obsidianmd/obsidian-releases/releases/latest | jq -r .tag_name | sed 's/^v//')
          echo "Obsidian version: $OBSIDIAN_VERSION"
          curl -fsSL -o /tmp/obsidian.deb \
            "https://github.com/obsidianmd/obsidian-releases/releases/download/v${OBSIDIAN_VERSION}/obsidian_${OBSIDIAN_VERSION}_amd64.deb"
          sudo apt-get install -y --no-install-recommends /tmp/obsidian.deb
          ls -la /opt/Obsidian/

      - name: Start Xvfb + window manager
        id: display
        if: always() && steps.e2e-setup.outcome == 'success'
        run: |
          Xvfb :99 -screen 0 1280x1024x24 +extension GLX +extension RANDR -noreset &
          sleep 1
          # Suppress herbstluftwm's panel autostart (the default panel.sh
          # crashes on Xvfb because xrandr returns an empty resolution string
          # which the panel width math can't parse — saw BadDrawable last run).
          mkdir -p "$HOME/.config/herbstluftwm"
          printf '#!/bin/bash\nexit 0\n' > "$HOME/.config/herbstluftwm/autostart"
          chmod +x "$HOME/.config/herbstluftwm/autostart"
          DISPLAY=:99 herbstluftwm &
          sleep 1
          echo "DISPLAY=:99" >> "$GITHUB_ENV"
          DISPLAY=:99 xdpyinfo | head -5 || true

      - name: Pre-configure Obsidian (test vault, plugin symlink, vault registry)
        id: e2e-vault
        if: always() && steps.e2e-setup.outcome == 'success'
        run: |
          set -eu
          VAULT=/tmp/obsidian-test-vault
          VAULT_ID=citest
          mkdir -p "$VAULT/.obsidian/plugins"
          ln -sfn "$GITHUB_WORKSPACE" "$VAULT/.obsidian/plugins/agentage-memory"
          echo '["agentage-memory"]' > "$VAULT/.obsidian/community-plugins.json"
          # Seed a real note so the vault has content; some first-run code paths
          # bail when the vault is empty.
          echo "# CI smoke" > "$VAULT/Welcome.md"
          # Bare workspace + appearance so Obsidian doesn't try a first-run
          # walkthrough/modal that blocks the main window from rendering.
          cat > "$VAULT/.obsidian/workspace.json" <<'WSEOF'
          { "main": { "id": "root", "type": "split", "children": [] }, "left": { "id": "left", "type": "split", "children": [] }, "right": { "id": "right", "type": "split", "children": [] }, "active": "root" }
          WSEOF
          echo '{}' > "$VAULT/.obsidian/appearance.json"
          # Registry — tells Obsidian which vault to open on launch.
          mkdir -p "$HOME/.config/obsidian"
          TS=$(date +%s%3N)
          cat > "$HOME/.config/obsidian/obsidian.json" <<EOF
          {
            "vaults": {
              "$VAULT_ID": { "path": "$VAULT", "ts": $TS, "open": true }
            }
          }
          EOF
          # Per-vault preferences — Obsidian errors silently on this missing
          # ENOENT and ends up exiting with no window.
          echo '{}' > "$HOME/.config/obsidian/$VAULT_ID.json"
          ls -la "$VAULT/.obsidian/" "$HOME/.config/obsidian/"

      - name: Diagnostic — Obsidian background + window capture
        if: always() && steps.e2e-vault.outcome == 'success'
        continue-on-error: true
        env:
          ELECTRON_ENABLE_LOGGING: '1'
          ELECTRON_ENABLE_STACK_DUMPING: '1'
        run: |
          set +e
          # Run Obsidian in the background with the vault as a positional arg
          # so we can probe for windows while it's alive.
          /opt/Obsidian/obsidian /tmp/obsidian-test-vault \
            --no-sandbox --disable-dev-shm-usage \
            --disable-gpu --disable-software-rasterizer --use-gl=swiftshader \
            > /tmp/obsidian.log 2>&1 &
          OBS_PID=$!
          echo "Obsidian PID: $OBS_PID"
          for i in $(seq 1 12); do
            if ! kill -0 "$OBS_PID" 2>/dev/null; then
              echo "Obsidian died at t=${i}s"
              break
            fi
            sleep 1
          done
          echo "::group::Obsidian stdout/stderr"
          cat /tmp/obsidian.log | head -300
          echo "::endgroup::"
          echo "::group::All windows after warmup"
          DISPLAY=:99 xdotool search --name '.*' getwindowname %@ 2>&1 || echo "(xdotool reported nothing)"
          DISPLAY=:99 wmctrl -l 2>&1 || true
          echo "::endgroup::"
          if kill -0 "$OBS_PID" 2>/dev/null; then
            echo "✓ Obsidian still alive after warmup"
            kill -TERM "$OBS_PID" 2>/dev/null
            sleep 2
            kill -KILL "$OBS_PID" 2>/dev/null
          else
            echo "✗ Obsidian exited during warmup"
          fi

      - name: E2E smoke tests
        id: e2e
        if: always() && steps.e2e-vault.outcome == 'success'
        env:
          OBSIDIAN_BIN: /opt/Obsidian/obsidian
          OBSIDIAN_VAULT: /tmp/obsidian-test-vault
        run: npm run test:e2e

      - name: Upload E2E artifacts
        if: always() && steps.e2e.outcome != 'skipped'
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results-${{ github.run_id }}
          path: |
            test-results/
            playwright-report/
          if-no-files-found: ignore
          retention-days: 7

      - name: Comment on PR
        if: always()
        uses: actions/github-script@v9
        with:
          script: |
            const marker = '<!-- pr-validation-bot -->';
            const checks = [
              { name: 'Dependencies installed', outcome: '${{ steps.install.outcome }}' },
              { name: 'Type check passed', outcome: '${{ steps.type-check.outcome }}' },
              { name: 'Linting passed', outcome: '${{ steps.lint.outcome }}' },
              { name: 'Format check passed', outcome: '${{ steps.format.outcome }}' },
              { name: 'Tests + coverage passed', outcome: '${{ steps.test.outcome }}' },
              { name: 'Build successful', outcome: '${{ steps.build.outcome }}' },
              { name: 'Obsidian installed for E2E', outcome: '${{ steps.e2e-setup.outcome }}' },
              { name: 'Xvfb + window manager started', outcome: '${{ steps.display.outcome }}' },
              { name: 'Test vault + plugin symlink ready', outcome: '${{ steps.e2e-vault.outcome }}' },
              { name: 'E2E smoke tests passed', outcome: '${{ steps.e2e.outcome }}' },
            ];
            const allPassed = checks.every((c) => c.outcome === 'success');
            const status = allPassed ? '✅ PASSED' : '❌ FAILED';
            const emoji = allPassed ? '🎉' : '💥';
            const checkLines = checks
              .map((c) => `- ${c.outcome === 'success' ? '✅' : c.outcome === 'skipped' ? '⏭️' : '❌'} ${c.name}`)
              .join('\n');
            const body = [
              marker,
              `${emoji} **PR Validation ${status}**`,
              '',
              `**Commit:** \`${{ github.event.pull_request.head.sha }}\``,
              `**Branch:** \`${{ github.head_ref }}\``,
              '',
              '**Checks:**',
              checkLines,
              '',
              allPassed ? '**Ready to merge!** ✨' : '**Please fix the failing checks.**',
              '',
              '---',
              `🔗 [View workflow run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(
              (c) => c.user.login === 'github-actions[bot]' && c.body.startsWith(marker)
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
